<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - LLM Evaluation Pipeline</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .auth-container {
      background-color: #1e293b;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: #f8fafc;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { background-color: #0369a1; }
    .notification {
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.875rem;
    }
    .error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #f87171; }
    .success { background-color: #064e3b; color: #d1fae5; border: 1px solid #34d399; }
    .redirect-link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
    .redirect-link a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2>Reset Password</h2>
    <div id="notification-box" class="notification"></div>

    <form id="forgot-password-form">
      <div class="form-group">
        <label for="email">Registered Email Address</label>
        <input type="email" id="email" placeholder="name@domain.com" required>
      </div>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="redirect-link">
      <a href="Login.html">Back to Login</a>
    </div>
  </div>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const notifBox = document.getElementById('notification-box');

      notifBox.style.display = 'none';
      notifBox.innerText = '';

      try {
        const response = await fetch('http://localhost:5000/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to initiate password reset.');
        }

        notifBox.className = "notification success";
        notifBox.style.display = 'block';
        notifBox.innerText = 'Password reset instructions have been dispatched to your email.';
      } catch (err) {
        notifBox.className = "notification error";
        notifBox.style.display = 'block';
        notifBox.innerText = err.message;
      }
    });
  </script>
</body>
</html>
