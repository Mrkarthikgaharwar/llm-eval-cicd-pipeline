<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LLM Evaluation Pipeline</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            box-sizing: border-box;
        }
        input:focus { outline: 2px solid #38bdf8; }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background-color: #0369a1; }
        .notification {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.875rem;
        }
        .error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #f87171; }
        .success { background-color: #064e3b; color: #d1fae5; border: 1px solid #34d399; }
        .redirect-link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
        .redirect-link a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Create Account</h2>
    
    <div id="notification-box" class="notification"></div>

    <form id="signup-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="At least 3 characters" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@domain.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min 8 chars, mixed case & symbol" required>
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
        </div>
        <button type="submit">Sign Up</button>
    </form>

    <div class="redirect-link">
        Already have an account? <a href="Login.html">Login here</a>
    </div>
</div>

<script>
  // Redirect instantly if user session already exists
  const token = localStorage.getItem('supabase_auth_token');
  if (token) {
    window.location.href = '../dashboard/Dashboard.html';
  }

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const notifBox = document.getElementById('notification-box');
    
    notifBox.style.display = 'none';
    notifBox.innerText = '';

    // Fast-track client-side confirmation check
    if (password !== confirmPassword) {
      notifBox.className = "notification error";
      notifBox.style.display = 'block';
      notifBox.innerText = 'Passwords do not match.';
      return;
    }

    try {
      notifBox.className = "notification success";
      notifBox.innerText = "Processing registration...";
      notifBox.style.display = "block";

      // Secure network request rerouted straight to Express server endpoints
      const response = await fetch('http://localhost:5000/api/auth/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, email, password, confirmPassword })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Registration processing failed.');
      }

      notifBox.innerText = 'Registration successful! Redirecting to login...';
      setTimeout(() => {
        window.location.href = './Login.html';
      }, 1500);

    } catch (err) {
      notifBox.className = "notification error";
      notifBox.style.display = 'block';
      notifBox.innerText = err.message;
    }
  });
</script>
</body>
</html>
